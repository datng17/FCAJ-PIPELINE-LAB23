version: 0.0
os: linux
files:
  - source: /index.html
    destination: /var/www/html/
    overwrite: true
  - source: /logo_fcaj.png
    destination: /var/www/html/
    overwrite: true
hooks:
  ApplicationStop:
    - location: scripts/stop_server
      timeout: 300
      runas: root
  BeforeInstall:
    - location: scripts/install_dependencies
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_server
      timeout: 300
      runas: root

permissions:
  - object: /var/www/html/
    pattern: "**"
    owner: www-data
    group: www-data
